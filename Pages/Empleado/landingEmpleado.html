<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OperPan | Panel Empleado</title>
    <link rel="stylesheet" href="../admin/Assets/style.css">
</head>

<body class="admin">

    <!-- HEADER PRINCIPAL -->
    <header class="admin__header">
        <h1 class="admin__title">Estación Paisa</h1>
        <div class="nav-container">
            <span class="nav-label">Vista Empleado</span>
            <button class="button button--secondary" onclick="cerrarSesion()">
                Cerrar sesión
            </button>
        </div>
    </header>

    <!-- NAVEGACIÓN PRINCIPAL -->
    <nav class="admin__nav">
        <ul class="admin__menu">
            <li><a class="nav__btn" href="./sub-pages-empleado/1-asistencia.html">Registro de asistencia</a></li>
            <li><a class="nav__btn" href="./sub-pages-empleado/2-solicitudes.html">Gestión de solicitudes</a></li>
            <li><a class="nav__btn" href="./sub-pages-empleado/3-tareas.html">Gestión de tareas</a></li>
            <li><a class="nav__btn" href="./sub-pages-empleado/4-personal.html">Información personal</a></li>
        </ul>
    </nav>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="admin__main">

        <section class="admin__section">
            <header class="section__header">
                <h2 class="section__title">Bienvenido, Eddier</h2>
                <p class="section__description">Selecciona una sección del menú para comenzar</p>
            </header>

            <div class="employee-info">
                <div class="employee-info__card">
                    <div class="employee-info__avatar" aria-hidden="true">ERP</div>
                    <div class="employee-info__details">
                        <h3 class="employee-info__name">EDDIER PAZ PARDO</h3>
                        <div class="employee-info__meta">
                            <span class="employee-info__badge">ID: EMP-2024-156</span>
                            <span class="employee-info__badge employee-info__badge--role">Panadero Principal</span>
                            <span class="employee-info__badge">Turno: Mañana (6am - 2pm)</span>
                        </div>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <script src="../../Scripts/script.js"></script>

</body>
</html>
