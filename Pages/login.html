<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">

    <!-- Meta Tags SEO -->
    <meta name="description" content="OperPan — Sistema de Gestión de Personal para Estación Paisa. Automatiza procesos administrativos, control de asistencia, horarios, permisos y reportes." />
    <meta name="keywords" content="gestión de personal, recursos humanos, control de asistencia, horarios, permisos, reportes, Estación Paisa, OperPan" />
    <meta name="author" content="ClessLab: EddierPaz, Paula Herrera, Santiago Muñeton" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Facebook -->
    <meta property="og:title" content="OperPan — Sistema de Gestión de Personal · Estación Paisa" />
    <meta property="og:description" content="Centraliza la gestión del personal y optimiza la operación administrativa de Estación Paisa. Todo en un solo lugar, seguro y organizado." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://github.com/operpangestion/OperPan/blob/main/Assets/img/logo/00-operpan.png" />
    <meta property="og:url" content="https://operpangestion.github.io/OperPan/" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="OperPan — Sistema de Gestión de Personal" />
    <meta name="twitter:description" content="Gestión integral de empleados, horarios, asistencia y permisos para Estación Paisa." />
    <meta name="twitter:image" content="https://github.com/operpangestion/OperPan/blob/main/Assets/img/logo/00-operpan.png" />
    <title>OperPan | Iniciar Sesión</title>

    <link rel="icon" type="image/png" href="../Assets/img/logo/00-operpan.png" />

    <!-- Bootstrap 5 CSS + Icons + Poppins Font -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../Assets/login.css">
</head>

<body>

    <main>
        <div class="login-card">
            <a href="../index.html" type="button" class="volver">
                <i class="bi bi-chevron-left"></i><span>Inicio</span>
            </a>
            <!-- Logo y cabecera institucional -->
            <div class="logo-wrapper">
                <img class="logo-operpan" src="../Assets/img/logo/01-estacion-paisa.png" alt="Empresa">
            </div>
            <div class="brand-titles">
                <h1>Panadería</h1>
                <h1>Estación Paisa</h1>
                <div class="system-badge">
                    <i class="bi bi-person-badge"></i> OperPan
                </div>
            </div>

            <!-- Tabs: Acceso administrativo / Acceso empleado -->
            <div class="access-tabs" role="tablist">
                <button type="button" class="tab-btn active" id="tabAdminGerente">
                    <i class="bi bi-shield-lock"></i> Administrativo
                </button>
                <button type="button" class="tab-btn" id="tabEmpleado">
                    <i class="bi bi-person-badge"></i> Empleado (Código)
                </button>
            </div>

            <!-- PANEL ADMIN / GERENTE (usuario + contraseña) -->
            <div id="adminFormPane" class="form-pane">
                <form id="loginAdminForm" novalidate>
                    <div class="form-group">
                        <div class="input-icon">
                            <i class="bi bi-person-circle"></i>
                            <input type="text" id="adminUser" class="form-control-custom" placeholder="Usuario"
                                autocomplete="username" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <div class="input-icon">
                            <i class="bi bi-lock-fill"></i>
                            <input type="password" id="adminPass" class="form-control-custom" placeholder="Contraseña"
                                autocomplete="current-password" required>
                        </div>
                    </div>
                    <button type="submit" class="btn-login" id="submitAdminBtn">
                        <i class="bi bi-box-arrow-in-right"></i> Iniciar Sesión
                    </button>
                </form>
            </div>

            <!-- PANEL EMPLEADO (código personal) -->
            <div id="empleadoFormPane" class="form-pane" style="display: none;">
                <form id="loginEmpleadoForm" novalidate>
                    <div class="form-group">
                        <div class="input-icon">
                            <i class="bi bi-upc-scan"></i>
                            <input type="text" id="empleadoCodigo" class="form-control-custom"
                                placeholder="Código personal (ej: EMP001)" autocomplete="off" required>
                        </div>
                    </div>
                    <button type="submit" class="btn-login" id="submitEmpleadoBtn">
                        <i class="bi bi-box-arrow-in-right"></i> Ingresar con código
                    </button>
                </form>
            </div>

            <!-- Mensajes globales de feedback -->
            <div id="globalMessage" class="message-area">
                <i class="bi bi-exclamation-triangle-fill"></i> <span id="msgText"></span>
            </div>

            <div class="forgot-link">
                <a href="#" id="forgotPasswordLink"><i class="bi bi-question-circle"></i> ¿Olvidaste tu contraseña o
                    código?</a>
            </div>
            <div class="forgot-link">
                <a href="https://mail.google.com/mail/?view=cm&fs=1&to=eddierpaz9@gmail.com&su=Soporte%20OperPan"
                    target="_blank" class="text text-decoration-none d-block custom-sidebar-link">
                    <small><i class="bi bi-question-circle me-2"></i>Ayuda / Soporte</small>
                </a>
            </div>
            <div class="footer-note">
                <i class="bi bi-shield-check"></i> Entorno seguro · Auditoría de accesos
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../Scripts/login.js"></script>
</body>

</html>
