<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OperPan | Login</title>
    <link rel="stylesheet" href="./Assets/styles.css">
</head>
<body class="login-body">

    <main class="login">
        <section class="login__card">

            <header class="login__header">
                <h1 class="login__title">Estación Paisa</h1>
                <p class="login__subtitle">OperPan - <em> Sistema de Gestión de Personal</em></p>
            </header>

            <form class="login__form">
                
                <div class="login__user">
                    <label for="usuario"><img class="img-login-user"  src="./img/img.readme/user.svg" alt="user"></label>
                    <input type="usuario" id="usuario"  class="login__input" placeholder="Ingrese su nombre de Usuario" required>
                </div>

                <div class="login__password">
                    <label for="password" class="login__label"><img class="img-login-user" src="./img/img.readme/candado.svg" alt=""></label>
                    <input type="password" id="password" class="login__input" placeholder="••••••••" required>
                </div>


                <a type="submit" class="login__button" href="./Pages/Empleado/landingEmpleado.html">
                    Iniciar Sesión
                </a>
                <br>
                <a href="olvide" class="reset_password">¿Olvidaste tu contraseña?</a>
                             
            </form>

        </section>
    </main>

    <!-- <script src="./Scripts/script.js"></script> -->
</body>
</html>
