<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OperPan | Login</title>
    <link rel="stylesheet" href="./Assets/styles.css">
</head>

<body class="login-body">

    <main class="login">
        <section class="login__card">
            <div>
                <img class="logo" src="./img/img-login/LOGO OPERPAN.png" alt="">
            </div>
            </form>
            <header class="login__header">
                <h1 class="login__title">Panaderia</h1>
                <h1 class="login__title">Estación Paisa</h1>
            </header>

            <form class="login__form">

                <div class="login__user">
                    <label for="usuario"><img class="img-login-user" src="./img/img.readme/user.svg" alt="user"></label>
                    <input type="usuario" id="usuario" class="login__input" placeholder="Usuario" required>
                </div>

                <div class="login__password">
                    <label for="password" class="login__label"><img class="img-login-user"
                            src="./img/img.readme/candado.svg" alt=""></label>
                    <input type="password" id="password" class="login__input" placeholder="Contraseña" required>
                </div>
                <a type="submit" class="login__button" href="./Pages/admin/landingAdmin.html">Iniciar Sesión</a>
                <br>
                <a href="olvide" class="reset_password">¿Olvidaste tu contraseña?</a>
        </section>
    </main>
</body>

</html>
